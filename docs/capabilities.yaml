# Edge-NET capability catalog
#
# Machine-readable inventory of every node, its inputs, outputs, displays,
# MQTT topics, and network identity. Intended to be handed to an agent to
# brainstorm applications — what to build, where devices live, how to interact
# with data without a phone or screen.
#
# Conventions:
#   - MQTT topics namespaced edge-net/<node>/<...>
#   - ip_status: "leased" = real dhcpd lease; "dynamic" = DHCP range, no fixed
#     IP needed (MQTT-only nodes); "fixed_when_built" = will need a pinned IP
#     because pf or SSH singles it out; "infra" = the hub itself.
#   - location: physical placement in the house. null = TBD (a brainstorm input).
#   - state: "built" = working code; "scaffold" = partial; "stub" = README only.

schema_version: 1
updated: 2026-07-01

network:
  subnet: 10.1.1.0/24
  gateway: 10.1.1.1        # the hub
  mqtt_broker:
    host: 10.1.1.1
    port: 1883
    transport: WiFi (bwfm0 AP), no internet required
  uplink:
    interface: bse0 (ethernet, optional)
    when_present: NAT out to home network; unlocks Grafana/Prometheus
    home_grafana: 192.168.0.216  # ports 3000 (Grafana), 9090 (Prometheus)
  pf_groups:
    linux_nodes: [10.1.1.10, 10.1.1.11]
    mcu_nodes:   [10.1.1.20, 10.1.1.21]
  ip_strategy: >
    MQTT-only nodes need no fixed IP — they reach the broker at 10.1.1.1:1883
    via the open WiFi-net rule. Pin an IP (dhcpd host block, needs MAC) only
    when pf must single a node out (today: GFX -> Grafana) or for reliable
    SSH/Ansible. Collect MACs lazily, per node, when that need arises.
  notes:
    - Only GFX (10.1.1.20) is currently allowed through pf to home Grafana.
    - Firewall is default-deny; per-node reachability is explicit in pf.conf.
    - Open question — remote fleet access (e.g. balena.io) for managing nodes
      through the firewall without per-node SSH. Not yet implemented.

nodes:
  - id: hub
    repo: edge-net-hub
    hardware: Raspberry Pi 4 (1GB)
    os: OpenBSD
    state: built
    location: null
    network: { ip: 10.1.1.1, ip_status: infra, class: infra }
    role: Router, firewall (pf), WiFi AP (hostap), DHCP, MQTT broker (Mosquitto)
    inputs: []
    outputs: []
    displays: []
    mqtt: { publishes: [], subscribes: [] }
    notes: >
      The substrate. Every other node hangs off this. Mosquitto binds on
      10.1.1.1:1883 (Edge-NET WiFi) and also reachable from home network at
      192.168.0.145:1883 (DHCP lease — may change; set static reservation if
      needed, MAC d8:3a:dd:8e:c1:42).

  - id: keybow
    repo: edge-net-keybow
    hardware: Raspberry Pi Zero W + Keybow Mini (3-key, coloured keycaps)
    os: Raspberry Pi OS (Python)
    state: built
    location: null
    network: { ip: 10.1.1.10, ip_status: leased, mac: "b8:27:eb:28:2d:8e", class: linux }
    inputs:
      - { name: button_0, kind: button, gpio: 17, mqtt_pub: edge-net/keybow/button/0, payload: '{"event":"press"} / {"event":"release"}' }
      - { name: button_1, kind: button, gpio: 22, mqtt_pub: edge-net/keybow/button/1, payload: '{"event":"press"} / {"event":"release"}' }
      - { name: button_2, kind: button, gpio: 6,  mqtt_pub: edge-net/keybow/button/2, payload: '{"event":"press"} / {"event":"release"}' }
    outputs:
      - { name: led_0, kind: rgb_led, driver: APA102/SPI, mqtt_sub: edge-net/keybow/led/0, payload: '{"rgb":[r,g,b]}' }
      - { name: led_1, kind: rgb_led, driver: APA102/SPI, mqtt_sub: edge-net/keybow/led/1, payload: '{"rgb":[r,g,b]}' }
      - { name: led_2, kind: rgb_led, driver: APA102/SPI, mqtt_sub: edge-net/keybow/led/2, payload: '{"rgb":[r,g,b]}' }
    displays: []
    mqtt:
      publishes: [edge-net/keybow/button/0, edge-net/keybow/button/1, edge-net/keybow/button/2]
      subscribes: [edge-net/keybow/led/0, edge-net/keybow/led/1, edge-net/keybow/led/2]
    notes: >
      Three physical coloured keycap buttons, each with its own RGB LED underneath.
      Publishes both press AND release events. Two-way per key — light a button to
      signal "needs attention", press sends the response. Full Linux, SSH-accessible.
      Strongest fit for logging discrete events (e.g. a button per household task).

  - id: gfx
    repo: edge-net-gfx
    hardware: Raspberry Pi Pico W + Pimoroni GFX Pack + Adafruit Mini I2C Gamepad (STEMMA QT)
    os: MicroPython
    state: scaffold
    location: null
    network: { ip: 10.1.1.20, ip_status: fixed_when_built, class: mcu }
    inputs:
      - { name: button_a, kind: button, role: app, mqtt_pub: edge-net/gfx/button/a, payload: press/release }
      - { name: button_b, kind: button, role: app, mqtt_pub: edge-net/gfx/button/b, payload: press/release }
      - { name: button_c, kind: button, role: app, mqtt_pub: edge-net/gfx/button/c, payload: press/release }
      - { name: button_d, kind: button, role: app, mqtt_pub: edge-net/gfx/button/d, payload: press/release }
      - { name: button_e, kind: button, role: back/home, mqtt_pub: edge-net/gfx/button/e, payload: press/release }
    outputs:
      - { name: backlight, kind: rgb_backlight, detail: "RGB LCD backlight, colour as ambient signal" }
    displays:
      - name: lcd
        kind: monochrome_lcd
        resolution: 128x64
        capabilities: [text, graphics, graphs, sparklines, menus, status_screens]
        mqtt_sub: edge-net/gfx/display
    mqtt:
      publishes: [edge-net/gfx/button/a, edge-net/gfx/button/b, edge-net/gfx/button/c, edge-net/gfx/button/d, edge-net/gfx/button/e]
      subscribes: [edge-net/gfx/display]
    notes: >
      Five buttons + small graphical display = the interactive terminal of the
      network. Also hosts the GamepadQT over I2C (STEMMA QT) — reads the analog
      stick and 6 buttons and publishes them as edge-net/gamepad/* topics.
      Only node firewalled through to home Grafana/Prometheus.

  - id: plasma-1
    repo: edge-net-plasma
    hardware: Pimoroni Plasma Stick 2040W
    os: MicroPython
    state: built
    location: null
    network: { ip: null, ip_status: dynamic, class: mcu }
    inputs: []
    outputs:
      - name: led_strip
        kind: addressable_rgb
        detail: WS2812 / NeoPixel, 50 LEDs on GP15
        capabilities: [solid_colour, per_pixel_frame, named_animations, foldable_to_grid_10x5]
        mqtt_sub: edge-net/gamepad/frame
    displays: []
    mqtt:
      publishes: []
      subscribes:
        - edge-net/gamepad/frame
        - edge-net/gamepad/led
        - edge-net/gamepad/led/clear
        - edge-net/gamepad/animate
    notes: >
      Subscribes to shared gamepad topics so GFX drives both strips simultaneously
      as one broadcast. Designed for hard-to-reach places: single USB cable,
      WiFi-only, no SSH. WebREPL not enabled — physical access needed for firmware updates.

  - id: plasma-2
    repo: edge-net-plasma
    hardware: Pimoroni Plasma Stick 2040W
    os: MicroPython
    state: built
    location: null
    network: { ip: null, ip_status: dynamic, class: mcu, device_id: "2" }
    inputs: []
    outputs:
      - name: led_strip
        kind: addressable_rgb
        detail: WS2812 / NeoPixel, 50 LEDs on GP15
        capabilities: [solid_colour, per_pixel_frame, named_animations, foldable_to_grid_10x5]
    displays: []
    mqtt:
      publishes: []
      subscribes:
        - edge-net/gamepad/frame
        - edge-net/gamepad/led
        - edge-net/gamepad/led/clear
        - edge-net/gamepad/animate
        - edge-net/plasma/2/frame
        - edge-net/plasma/2/led
        - edge-net/plasma/2/led/clear
        - edge-net/plasma/2/animate
    topic_detail:
      - { topic: "edge-net/plasma/2/animate", dir: subscribe, payload: '"rainbow [speed]" | "fire" | "fade HEX,HEX" | "flash HEX,HEX" | "off"' }
      - { topic: "edge-net/plasma/2/led",     dir: subscribe, payload: '"r,g,b" — solid fill, stops animation' }
      - { topic: "edge-net/plasma/2/led/clear", dir: subscribe, payload: 'any — strip off' }
      - { topic: "edge-net/plasma/2/frame",   dir: subscribe, payload: 'hex string, 6 chars/pixel RRGGBB, up to 50 pixels' }
    mcp_interface:
      status: code in repo (edge-net-plasma main.py), NOT YET FLASHED
      command_topic: edge-net/plasma/cmd
      state_topic: edge-net/plasma/state
      ack_topic: edge-net/plasma/ack
      command_payload: '{"action":"set_led_pattern","pattern":"solid|pulse|rainbow|fire|fade|flash|off","color":"#rrggbb","correlationId":"uuid"}'
      state_payload: '{"pattern":"...","color":"..."}  # retained'
      ack_payload: '{"correlationId":"...","ok":true}'
    notes: >
      Also subscribes to shared gamepad/* topics (same as plasma-1). Per-device topics
      use DEVICE_ID "2". MCP command interface written and in repo — needs one physical
      flash to activate. WebREPL not enabled — enable on next physical access to allow
      wireless updates thereafter.

  - id: gamepad
    repo: edge-net-gamepad
    hardware: Adafruit Mini I2C Gamepad (seesaw) on GFX Pack host (Pi Pico W + Pimoroni GFX Pack)
    os: MicroPython
    state: scaffold
    location: null
    network: { ip: null, ip_status: dynamic, class: mcu }
    host_board: GFX Pack / Pi Pico W — reads gamepad over I2C (STEMMA QT), publishes over WiFi
    inputs:
      - { name: button_a,      kind: button,   seesaw_pin: 5,  mqtt_pub: edge-net/gamepad/button/a,      payload: press/release }
      - { name: button_b,      kind: button,   seesaw_pin: 1,  mqtt_pub: edge-net/gamepad/button/b,      payload: press/release }
      - { name: button_x,      kind: button,   seesaw_pin: 6,  mqtt_pub: edge-net/gamepad/button/x,      payload: press/release }
      - { name: button_y,      kind: button,   seesaw_pin: 2,  mqtt_pub: edge-net/gamepad/button/y,      payload: press/release }
      - { name: button_start,  kind: button,   seesaw_pin: 16, mqtt_pub: edge-net/gamepad/button/start,  payload: press/release }
      - { name: button_select, kind: button,   seesaw_pin: 0,  mqtt_pub: edge-net/gamepad/button/select, payload: press/release }
      - { name: joystick_x,    kind: analog_axis, adc: 14, range: "0-1023", centre: 512, deadzone: 80, mqtt_pub: edge-net/gamepad/axis/x }
      - { name: joystick_y,    kind: analog_axis, adc: 15, range: "0-1023", centre: 512, deadzone: 80, mqtt_pub: edge-net/gamepad/axis/y }
    outputs:
      - { name: led_strip, kind: addressable_rgb, detail: "shared 50-LED strip, local feedback", mqtt_sub: edge-net/gamepad/led }
    displays: []
    mqtt:
      publishes:
        - edge-net/gamepad/button/a
        - edge-net/gamepad/button/b
        - edge-net/gamepad/button/x
        - edge-net/gamepad/button/y
        - edge-net/gamepad/button/start
        - edge-net/gamepad/button/select
        - edge-net/gamepad/axis/x
        - edge-net/gamepad/axis/y
      subscribes: [edge-net/gamepad/led, edge-net/gamepad/led/clear]
    notes: >
      Richest input surface on the network — analog stick + 6 buttons. The
      natural universal remote / navigation device. Dual role: the gamepad is a
      dumb I2C device; the Plasma Stick reads it, publishes over its own WiFi,
      and drives the shared LED strip. One board, one connection, two jobs.
      Portable — move the gamepad to any WiFi+I2C host and only config changes.

  - id: automation
    repo: edge-net-automation
    hardware: Raspberry Pi 3A + Pimoroni Automation Hat
    os: Raspberry Pi OS (Python)
    state: built
    location: null
    network: { ip: 10.1.1.11, ip_status: fixed_when_built, class: linux }
    inputs:
      - { name: adc_1, kind: adc, detail: "12-bit, 0-24V", mqtt_pub: edge-net/automation/adc/1 }
      - { name: adc_2, kind: adc, detail: "12-bit, 0-24V", mqtt_pub: edge-net/automation/adc/2 }
      - { name: adc_3, kind: adc, detail: "12-bit, 0-24V", mqtt_pub: edge-net/automation/adc/3 }
      - { name: adc_lv, kind: adc, detail: "12-bit, 0-3.3V", mqtt_pub: edge-net/automation/adc/lv }
      - { name: input_1, kind: buffered_input, detail: "24V tolerant" }
      - { name: input_2, kind: buffered_input, detail: "24V tolerant" }
      - { name: input_3, kind: buffered_input, detail: "24V tolerant" }
    outputs:
      - { name: relay_1, kind: relay, detail: "24V @ 2A, NC+NO", mqtt_sub: edge-net/automation/relay/1 }
      - { name: relay_2, kind: relay, detail: "24V @ 2A, NC+NO", mqtt_sub: edge-net/automation/relay/2 }
      - { name: relay_3, kind: relay, detail: "24V @ 2A, NC+NO", mqtt_sub: edge-net/automation/relay/3 }
      - { name: sink_1, kind: sinking_output, detail: "24V tolerant" }
      - { name: sink_2, kind: sinking_output, detail: "24V tolerant" }
      - { name: sink_3, kind: sinking_output, detail: "24V tolerant" }
      - name: audio
        kind: audio_out
        detail: "3.5mm jack on Pi 3A — plays WAV files and TTS via espeak"
        mqtt_sub: edge/hub/audio/play
    displays:
      - { name: channel_leds, kind: indicator_leds, detail: "15 channel + power/comms/warn" }
    mqtt:
      publishes:
        - edge-net/automation/status
        - edge-net/automation/adc/1
        - edge-net/automation/adc/2
        - edge-net/automation/adc/3
        - edge/hub/audio/state
      subscribes:
        - edge-net/automation/relay/1
        - edge-net/automation/relay/2
        - edge-net/automation/relay/3
        - edge/hub/audio/play
    notes: >
      The rules engine and audio node of the network. Runs the generalised
      rule engine (subscribes to button events, drives outputs), audio service
      (edge/hub/audio/play → WAV or TTS via espeak), and task tracker service.
      ADC channels publish bare numbers (high-rate telemetry). Relay commands
      are retained JSON. Audio play topic accepts {"file":"chime.wav"},
      {"tts":"text"}, or {"volume":70}.

  - id: kindle
    repo: edge-net-kindle
    hardware: Kindle 4 (jailbroken, firmware 4.1.4, no backlight)
    os: Kindle Linux (Python, eips, lipc)
    state: built
    location: null
    network: { ip: dynamic (home net 192.168.0.x), ip_status: dynamic, class: linux, transport: "WiFi, polls HTTP on home network" }
    inputs:
      - { name: dpad, kind: buttons, detail: "up/down/left/right/select — lipc scancodes 193-197", mqtt_pub: "edge-net/kindle/button/<name>", payload: press }
      - { name: page_turn, kind: buttons, detail: "page_back/page_fwd — lipc scancodes 104/109", mqtt_pub: "edge-net/kindle/button/<name>", payload: press }
      - { name: misc, kind: buttons, detail: "menu/back/home — lipc scancodes 139/158/102", mqtt_pub: "edge-net/kindle/button/<name>", payload: press }
    outputs: []
    displays:
      - name: eink
        kind: eink_grayscale
        resolution: 600x800
        capabilities: [render_png, text, images, ambient_dashboard]
        method: "polls 192.168.0.62:8080/kindle/display.png every 5 min, renders with eips -g"
    mqtt:
      publishes:
        - edge-net/kindle/button/up
        - edge-net/kindle/button/down
        - edge-net/kindle/button/left
        - edge-net/kindle/button/right
        - edge-net/kindle/button/select
        - edge-net/kindle/button/page_back
        - edge-net/kindle/button/page_fwd
        - edge-net/kindle/button/menu
        - edge-net/kindle/button/back
        - edge-net/kindle/button/home
      subscribes: []
    notes: >
      WORKING (2026-06-22). Display shows weather, task state (Bathroom/Bedroom/Kitchen/Hallway),
      node health. Polls Flask server (LXC CT212 at 192.168.0.62) every 5 min.
      Button daemon ready (scripts/buttons.sh via lipc-wait-event) — publishes to
      kindle-server HTTP bridge which forwards to MQTT. Screensaver disabled.
      Boot persistence (startup.sh auto-run) not yet wired to init system.

  - id: inky
    repo: edge-net-inky
    hardware: Pi Pico W + Pimoroni Inky Pack (2.9" mono e-ink, 296x128, 3 buttons A/B/C)
    os: MicroPython
    state: scaffold
    location: null
    network: { ip: null, ip_status: dynamic, class: microcontroller, transport: "WiFi, MQTT and/or HTTP pull" }
    inputs:
      - { name: buttons, kind: buttons, detail: "3 tactile buttons A/B/C alongside the panel" }
    outputs: []
    displays:
      - name: eink
        kind: eink_mono
        resolution: 296x128
        capabilities: [render_png, text, images, graphs, ambient_dashboard]
        method: render on home network and push image, or draw on-device with Pimoroni libs
    mqtt:
      publishes: [edge-net/inky/button/a, edge-net/inky/button/b, edge-net/inky/button/c]
      subscribes: [edge-net/inky/display]
    notes: >
      Battery-capable e-ink with onboard buttons and a Pico W. Unlike the Kindle
      (always-on, off-device PNG render), this can deep-sleep for weeks: wake on
      timer, pull latest state, redraw, sleep. Slow refresh — calm static state,
      not live motion. Keep firmware a dumb image/spec sink to avoid reflashing
      on every layout change. Topics proposed.

  - id: sony-avr
    repo: edge-net-sony-dn1080
    hardware: Sony STR-DN1080 AV receiver (network-native, Audio Control API on port 10000)
    os: "n/a — adapter runs as LXC CT 210 on pve1 (192.168.0.60), Python"
    state: built
    location: null
    network: { ip: 192.168.0.6, ip_status: dynamic, class: home_network }
    inputs: []
    outputs:
      - { name: avr, kind: av_receiver, detail: "power, input, volume, mute, surround" }
    displays: []
    mqtt:
      publishes: [edge-net/avr/state]
      subscribes: [edge-net/avr/power, edge-net/avr/input, edge-net/avr/volume, edge-net/avr/mute, edge-net/avr/sound]
    topic_detail:
      - { topic: "edge-net/avr/power",  dir: subscribe, payload: '{"state":"on"|"off"}' }
      - { topic: "edge-net/avr/input",  dir: subscribe, payload: '{"source":"bd-dvd"|"game"|"tv"|...}' }
      - { topic: "edge-net/avr/volume", dir: subscribe, payload: '{"level":42} or "up"/"down"' }
      - { topic: "edge-net/avr/mute",   dir: subscribe, payload: '"on"|"off"|"toggle"' }
      - { topic: "edge-net/avr/sound",  dir: subscribe, payload: '"dolby-surround"|"multi-stereo"|...' }
      - { topic: "edge-net/avr/state",  dir: publish,   payload: '{"power":"...","source":"...","volume":n,"mute":bool}', retained: true }
    notes: >
      Network-native AVR — adapter polls the Audio Control API every 5s and publishes
      retained state. Earns /state because the API pushes real notifications (user
      picks up remote, front panel → adapter sees it). When both AVRs run at once
      use edge-net/avr/sony/* to address this unit specifically.

  - id: hk-avr
    repo: edge-net-hk-avr365
    hardware: "Harman Kardon AVR 365 (RS-232 only) + Pi Pico W bridge + MAX3232 level shifter"
    os: MicroPython
    state: scaffold
    location: null
    network: { ip: null, ip_status: dynamic, class: mcu }
    inputs: []
    outputs:
      - { name: avr, kind: av_receiver, detail: "power, input, volume, mute, surround via RS-232" }
    displays: []
    mqtt:
      publishes: [edge-net/avr/status]
      subscribes: [edge-net/avr/power, edge-net/avr/input, edge-net/avr/volume, edge-net/avr/mute, edge-net/avr/sound]
    topic_detail:
      - { topic: "edge-net/avr/power",  dir: subscribe, payload: '"on"|"off"' }
      - { topic: "edge-net/avr/input",  dir: subscribe, payload: '"dvd"|"vid1"|"cd"|...' }
      - { topic: "edge-net/avr/volume", dir: subscribe, payload: '"up"|"down"' }
      - { topic: "edge-net/avr/mute",   dir: subscribe, payload: '"on"|"off"|"toggle"' }
      - { topic: "edge-net/avr/sound",  dir: subscribe, payload: 'surround mode string' }
