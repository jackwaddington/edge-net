  - id: edge-net-mcp
    repo: edge-net-mcp
    hardware: Proxmox LXC CT219 on pve1 (192.168.0.69)
    os: Node.js / MicroPython SDK
    state: built — deployed via terraform, NOT YET running (terraform apply pending)
    location: homelab (pve1)
    network: { ip: 192.168.0.69, port: 9583, class: homelab_service }
    role: >
      MCP server exposing edge-net nodes as tools for Claude (web or CLI).
      Bridges the MQTT fabric to the MCP protocol over Streamable HTTP.
      Add https://edge-net-mcp.jackwaddington.com/mcp to Claude.ai Settings → Integrations.
    tools:
      - { name: list_nodes,      description: "List all exposed nodes, hardware, and risk tier" }
      - { name: get_node_state,  description: "Read last-known retained MQTT state for a node" }
      - { name: set_display,     description: "Set text or named screen on gfx or samsung-frame" }
      - { name: set_led_pattern, description: "Set LED colour/pattern on plasma" }
      - { name: av_control,      description: "Power/input/volume on hk-avr365, sony-dn1080, lg-um7400" }
    env:
      EDGE_NET_MQTT_URL: mqtt://192.168.0.145:1883
      EDGE_NET_MCP_PORT: 9583
      EDGE_NET_MCP_MAX_RISK: safe  # "guarded" nodes (automation relay) not exposed
    deploy:
      - terraform apply -target=module.edge_net_mcp -target=cloudflare_record.edge_net_mcp
      - Add Cloudflare Zero Trust public hostname: edge-net-mcp.jackwaddington.com → http://192.168.0.69:9583
      - Add URL to Claude.ai Settings → Integrations
    notes: >
      Starts in degraded mode if MQTT unreachable at boot (tools return {known:false},
      reconnects in background). Risk tiers gate exposure — guarded nodes need a
      confirm-gate tool before being wired. See edge-net-mcp repo for full details.

# ── Interaction primitives (for the brainstorm agent) ─────────────────────────
# Distilled "what can this network actually do" without a phone or screen:
interaction_primitives:
  discrete_input:
    - "3 Keybow buttons (coloured keycaps, per-button RGB LED, publishes press + release)"
    - "6 Gamepad buttons (A/B/X/Y + start/select, publishes press + release)"
    - "5 GFX buttons (A/B/C/D + back/home, publishes press + release)"
    - "3 Inky buttons (A/B/C alongside e-ink panel, publishes press + release)"
    - "Kindle d-pad + page-turn + menu/back/home (publishes press)"
    - "3 Automation Hat buffered inputs (24V tolerant — reed switch, door sensor, etc.)"
  continuous_input:
    - "Gamepad analog joystick (2 axes, 0-1023, 80-unit deadzone)"
    - "3 Automation Hat ADC channels (12-bit, 0-24V) + 1 low-voltage channel (0-3.3V)"
  ambient_output:
    - "50-LED RGB strip plasma-1 (edge-net/gamepad/frame) — dumb framebuffer, 10x5 grid"
    - "50-LED RGB strip plasma-2 (edge-net/plasma/frame) — identical hardware, independent"
    - "3 Keybow RGB LEDs — per-task status lights (retained)"
    - "GFX RGB backlight — room-glance colour"
    - "15 Automation Hat channel LEDs"
  rich_output:
    - "GFX 128x64 LCD — graphs, menus, live data (edge-net/gfx/display)"
    - "Inky 296x128 mono e-ink — ambient display, low power (edge-net/inky/display)"
    - "Kindle 600x800 e-ink — calm ambient dashboard (polls HTTP, not MQTT)"
    - "LG TV screen — input switch, app launch, toast notifications (edge-net/tv/*)"
  audio_output:
    - "Pi 3A 3.5mm jack — WAV files or TTS via espeak (edge/hub/audio/play)"
    - "Sony AVR speaker output — controlled via edge-net/avr/* (network-native)"
    - "HK AVR speaker output — same topics, RS-232 bridge (scaffold)"
  physical_actuation:
    - "3 Automation Hat relays (24V @ 2A, NC+NO) — switch a lamp, fan, socket, latch"
    - "Sony AVR power/input/volume — full two-way (edge-net/avr/*)"
    - "HK AVR power/input/volume — same vocabulary, serial bridge (scaffold)"
  data_sinks:
    - "Postgres on home network (via uplink) — log events, timestamps"
    - "Grafana/Prometheus (GFX can read back)"

# ── External resources (home network, optional) ───────────────────────────────
# Not part of Edge-NET itself. Reachable only when the ethernet uplink is present
# and pf permits it. Edge-NET works standalone without these; they unlock the
# "smart" / persistent / analytical layer. Listed so the brainstorm knows they
# exist — not a requirement.
external_resources:
  database:
    host: db-01 (on pve1)
    stack: PostgreSQL + pgvector + Apache AGE (graph) + Redis
    reach: home network via uplink + pf
    use: persist events (task logs, timestamps), state, vectors, graph relations
  llm_router:
    name: LiteLLM
    routes_to: [Ollama GPU (Gaming PC), Ollama CPU (Mac Mini), Anthropic API, OpenAI API]
    reach: home network via uplink
    use: >
      local/cloud inference for an "intent engine" — decide what nodes should
      reflect, generate device config or code. See edge-net PLANNING.md.
  monitoring:
    stack: Grafana + Prometheus
    host: k3s (192.168.0.216)
    use: GFX can pull and display cluster/timelapse/metrics data
